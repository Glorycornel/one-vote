services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: one_vote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  realtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: realtime
    restart: unless-stopped
    environment:
      PORT: "4000"
      WEB_ORIGIN: "http://localhost:3000"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "4000:4000"
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/one_vote?schema=public"
      REDIS_URL: "redis://redis:6379"
      NEXT_PUBLIC_REALTIME_URL: "http://localhost:4000"
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
      - realtime

volumes:
  postgres_data:
