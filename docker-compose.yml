services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: one_vote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  realtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: realtime
    restart: unless-stopped
    environment:
      PORT: "4000"
      WEB_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000"
      REDIS_URL: "redis://redis:6379"
      DATABASE_URL: "postgresql://user:password@db:5432/one_vote?schema=public"
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/one_vote?schema=public"
      REDIS_URL: "redis://redis:6379"
      NEXT_PUBLIC_REALTIME_URL: "http://localhost:4000"
    ports:
      - "3000:3000"
    command: >
      sh -c "pnpm exec prisma migrate deploy &&
      pnpm --filter web exec next dev --hostname 0.0.0.0 --port 3000"
    depends_on:
      - db
      - redis
      - realtime

volumes:
  postgres_data:
